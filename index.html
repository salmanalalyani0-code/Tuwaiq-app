<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة طويق للكربون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        function TuwaiqCarbonPlatform() {
            const [carbonCredits, setCarbonCredits] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(false);

            const handleIssueCredit = () => {
                setIsLoading(true);
                // محاكاة عملية الإصدار
                setTimeout(() => {
                    const newCredit = {
                        id: Date.now(),
                        amount: 50,
                        project: 'مبادرة التشجير - الرياض',
                        date: new Date().toLocaleDateString('ar-SA'),
                        status: 'مُصدر بنجاح'
                    };
                    setCarbonCredits([newCredit, ...carbonCredits]);
                    setIsLoading(false);
                }, 1000);
            };

            return (
                <div className="min-h-screen">
                    {/* الشريط العلوي */}
                    <header className="bg-green-700 text-white p-6 shadow-md">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold">منصة طويق للكربون</h1>
                                <p className="mt-1 opacity-90 text-sm">النسخة التجريبية (Live Demo)</p>
                            </div>
                            <div className="bg-green-800 px-4 py-2 rounded-lg text-sm font-semibold">
                                إجمالي الرصيد: {carbonCredits.reduce((sum, item) => sum + item.amount, 0)} طن
                            </div>
                        </div>
                    </header>

                    {/* المحتوى */}
                    <main className="max-w-5xl mx-auto p-6 mt-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {/* لوحة التحكم */}
                        <div className="col-span-1 bg-white rounded-xl shadow-sm p-6 border border-gray-100 h-fit">
                            <h2 className="text-xl font-bold mb-4 text-gray-800">إدارة الصكوك</h2>
                            <p className="text-gray-600 text-sm mb-6">قم بإصدار صكوك كربون جديدة وتوثيقها في السجل الوطني بشكل فوري.</p>
                            <button
                                onClick={handleIssueCredit}
                                disabled={isLoading}
                                className={`w-full font-bold py-3 px-4 rounded-lg transition-all ${isLoading ? 'bg-gray-300' : 'bg-green-600 hover:bg-green-700'} text-white shadow-md`}
                            >
                                {isLoading ? 'جاري الإصدار...' : 'إصدار 50 طن كربون'}
                            </button>
                        </div>

                        {/* سجل العمليات */}
                        <div className="col-span-1 md:col-span-2 bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <h3 className="text-xl font-bold mb-6 text-gray-800 border-b pb-3">سجل الإصدارات الحديثة</h3>
                            {carbonCredits.length === 0 ? (
                                <div className="text-center py-10 text-gray-400">لم يتم إصدار أي صكوك حتى الآن.</div>
                            ) : (
                                <div className="space-y-4">
                                    {carbonCredits.map((credit) => (
                                        <div key={credit.id} className="flex justify-between items-center p-4 bg-gray-50 rounded-lg border border-gray-100">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-green-100 text-green-700 p-3 rounded-full font-bold">{credit.amount}T</div>
                                                <div>
                                                    <p className="font-semibold text-gray-800">{credit.project}</p>
                                                    <p className="text-xs text-gray-500">{credit.date}</p>
                                                </div>
                                            </div>
                                            <span className="bg-green-100 text-green-800 text-xs px-3 py-1.5 rounded-full font-medium">{credit.status}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TuwaiqCarbonPlatform />);
    </script>
</body>
</html>
